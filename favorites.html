<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的收藏 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .edu-card-premium {
            display: flex; gap: 16px; align-items: flex-start;
        }
        .edu-img-placeholder {
            width: 90px; height: 90px;
            border-radius: 14px;
            background: linear-gradient(45deg, #E5F1FF, #FFFFFF);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary-color); font-weight: bold;
        }
        .empty-state {
            padding: 80px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
            filter: grayscale(100%);
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>我的收藏</h1>
    </div>

    <div class="container animate-up">
        <div id="favoritesList">
            <!-- 骨架或空状态区域 -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderFavorites);

        function renderFavorites() {
            const info = App.getPatientInfo() || {};
            const favIds = info.favorites || [];
            const listContainer = document.getElementById('favoritesList');

            if (favIds.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state animate-up">
                        <div class="empty-icon">📂</div>
                        <h3 style="color: var(--text-main); margin-bottom: 8px;">暂无收藏</h3>
                        <p style="font-size: 14px;">您还没有收藏任何文章<br>遇到有用的科普知识点右上角收藏吧</p>
                        <button class="btn btn-outline" style="margin-top: 30px; width: auto; padding: 0 30px;" onclick="history.back()">去发现</button>
                    </div>
                `;
                return;
            }

            // 过滤出存在的对应文章
            const favItems = MockData.educationList.filter(item => favIds.includes(item.id));

            listContainer.innerHTML = favItems.map(item => `
                <div class="card edu-card-premium animate-up" onclick="App.navigateTo('education-detail.html?id=${item.id}')" style="margin-bottom: 16px;">
                    <div class="edu-img-placeholder">IMAGE</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 700; font-size: 16px; margin-bottom: 6px; line-height: 1.3;">${item.title}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 10px;">
                            <span class="badge badge-info">${item.type}</span>
                            <span>${item.readCount} 阅读</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
