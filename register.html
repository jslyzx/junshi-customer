<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实名核验 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>实名身份核验</h1>
    </div>

    <div class="container animate-up">
        <div class="card" style="margin-bottom: 30px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                <div style="width: 40px; height: 40px; border-radius: 12px; background: #E1F5E8; color: var(--success-color); display: flex; align-items: center; justify-content: center; font-size: 20px;">🛡️</div>
                <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.4;">您的信息已进行多重加密处理，仅用于医疗流程核验。</div>
            </div>

            <div class="form-group">
                <label class="form-label">手机号码</label>
                <input type="tel" id="phone" class="form-input" placeholder="请输入您的手机号" maxlength="11">
            </div>

            <div class="form-group">
                <label class="form-label">动态验证码</label>
                <div style="display: flex; gap: 12px;">
                    <input type="number" id="code" class="form-input" placeholder="6 位验证码" maxlength="6">
                    <button class="btn btn-secondary" style="width: 130px; font-size: 14px; background: var(--primary-soft); color: var(--primary-color); height: 54px; border-radius: 16px;" id="getCodeBtn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">真实姓名</label>
                <input type="text" id="realName" class="form-input" placeholder="请与身份证保持一致">
            </div>

            <div class="form-group" style="margin-bottom: 10px;">
                <label class="form-label">身份证号</label>
                <input type="text" id="idCard" class="form-input" placeholder="请输入 18 位身份证号" maxlength="18">
            </div>
        </div>

        <button class="btn btn-primary" onclick="handleRegister()">下一步</button>
        
        <div style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted);">
            <div style="display: inline-flex; align-items: center; gap: 5px;">
                <input type="checkbox" id="agreeCheck" checked style="accent-color: var(--primary-color); width: 16px; height: 16px;">
                <label for="agreeCheck">我已阅读并同意</label>
                <span style="color: var(--primary-color); cursor: pointer;" onclick="showPolicy('用户服务协议')">《用户服务协议》</span>
                <span>与</span>
                <span style="color: var(--primary-color); cursor: pointer;" onclick="showPolicy('内控隐私协议')">《内控隐私协议》</span>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('register.html');

        function showPolicy(name) {
            alert(`【${name}】\n\n欢迎阅读君实生物患者管理项目${name}。本协议将详细说明您的权利与义务及数据安全保障措施。 Demo 阶段仅展示入口。`);
        }

        function sendCode() {
            const phone = document.getElementById('phone').value;
            if (!/^1\d{10}$/.test(phone)) { alert('请输入正确的手机号'); return; }
            const btn = document.getElementById('getCodeBtn');
            btn.disabled = true;
            let count = 60;
            const timer = setInterval(() => {
                btn.innerText = `${--count}s`;
                if (count <= 0) { clearInterval(timer); btn.disabled = false; btn.innerText = '获取验证码'; }
            }, 1000);
            setTimeout(() => alert('【验证码发送成功】: 123456'), 500);
        }

        function handleRegister() {
            if (!document.getElementById('agreeCheck').checked) {
                alert('请先阅读并同意项目协议');
                return;
            }
            const name = document.getElementById('realName').value;
            const phone = document.getElementById('phone').value;
            const idCard = document.getElementById('idCard').value;
            if (!name || !phone || idCard.length < 18) { alert('请填写完整的实名信息'); return; }
            App.savePatientInfo({ name, phone, idCard, isRegistered: true });
            App.navigateTo('profile.html');
        }
    </script>
</body>
</html>
