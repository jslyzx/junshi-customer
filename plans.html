<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的管理计划 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .plan-header {
            background: var(--primary-gradient);
            padding: 40px 24px 60px;
            color: white;
            border-radius: 0 0 32px 32px;
            position: relative;
        }
        .plan-header .back-btn { color: white; border-color: rgba(255,255,255,0.3); top: 50px; }
        
        .medication-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .med-icon {
            width: 50px; height: 50px; background: white; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        .section-title {
            font-size: 16px; font-weight: 700; color: var(--text-main);
            margin: 28px 0 16px; display: flex; align-items: center; justify-content: space-between;
        }
        .section-title span:last-child {
            font-size: 12px; color: var(--text-muted); font-weight: 400;
        }

        .task-list { display: flex; flex-direction: column; gap: 14px; }
        .task-item {
            background: white; border-radius: 20px; padding: 18px;
            display: flex; align-items: center; gap: 16px;
            border: 1px solid #F0F2F5; box-shadow: var(--shadow-sm);
        }
        .task-item-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .task-item-body { flex: 1; }
        .task-item-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .task-item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .task-item-date {
            text-align: right; font-size: 13px; font-weight: 700; color: var(--primary-color);
        }
        .task-item-date .label {
            display: block; font-size: 10px; color: var(--text-muted); font-weight: 400; margin-bottom: 2px;
        }

        .edu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .edu-card {
            background: white; border-radius: 18px; padding: 14px;
            border: 1px solid #F0F2F5; box-shadow: var(--shadow-sm);
        }
        .edu-card-icon {
            width: 36px; height: 36px; border-radius: 10px; background: var(--primary-soft);
            display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 12px;
        }
        .edu-card-title {
            font-size: 13px; font-weight: 600; color: var(--text-main); line-height: 1.4;
            height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>

    <div class="plan-header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <div style="margin-top: 24px;">
            <div style="font-size: 14px; opacity: 0.8;">我的个性化随访管理计划</div>
            <h1 style="font-size: 24px; font-weight: 800; margin-top: 4px;">智能管理方案</h1>
        </div>
        
        <div class="medication-card">
            <div class="med-icon">💊</div>
            <div>
                <div style="font-size: 12px; opacity: 0.8;">当前用药方案</div>
                <div style="font-size: 18px; font-weight: 700;" id="medicationName">---</div>
            </div>
        </div>
    </div>

    <div class="container animate-up">
        <div class="section-title">
            <span>即将到来的任务</span>
            <span>共 <span id="taskCount">0</span> 项任务</span>
        </div>
        
        <div class="task-list" id="taskList">
            <!-- 动态渲染 -->
        </div>

        <div class="section-title">
            <span>为您推荐</span>
            <span>基于您的病情定制</span>
        </div>

        <div class="edu-grid" id="eduGrid">
            <!-- 动态渲染 -->
        </div>

        <div style="margin-top: 40px; padding: 24px; background: var(--primary-soft); border-radius: 20px; text-align: center; border: 1px solid rgba(0,122,255,0.1);">
            <div style="font-size: 28px; margin-bottom: 12px;">👩‍⚕️</div>
            <div style="font-size: 14px; font-weight: 700; color: var(--primary-color);">您的专属随访助手</div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.6;">
                计划执行过程中如有任何不适或疑问，<br>请随时通过“咨询”向我反馈。
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function initPage() {
            const plan = App.getFollowUpPlan();
            if (!plan) {
                alert('暂无计划数据');
                history.back();
                return;
            }

            document.getElementById('medicationName').innerText = plan.medication;
            document.getElementById('taskCount').innerText = plan.tasks.length;

            const taskList = document.getElementById('taskList');
            taskList.innerHTML = plan.tasks.map(task => {
                const today = new Date().setHours(0,0,0,0);
                const targetDate = new Date(task.date).setHours(0,0,0,0);
                const diffDays = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
                
                return `
                    <div class="task-item">
                        <div class="task-item-icon" style="background: ${task.color}15; color: ${task.color}">${task.icon}</div>
                        <div class="task-item-body">
                            <div class="task-item-title">${task.title}</div>
                            <div class="task-item-desc">${task.desc}</div>
                        </div>
                        <div class="task-item-date">
                            <span class="label">计划日期</span>
                            ${diffDays === 0 ? '今天' : diffDays + ' 天后'}
                        </div>
                    </div>
                `;
            }).join('');

            const eduGrid = document.getElementById('eduGrid');
            eduGrid.innerHTML = plan.recommendations.map(edu => {
                const mockEdu = MockData.educationList.find(e => e.id === edu.id) || { icon: '📖' };
                return `
                    <div class="edu-card" onclick="App.navigateTo('education-detail.html?id=${edu.id}')">
                        <div class="edu-card-icon">${mockEdu.icon}</div>
                        <div class="edu-card-title">${edu.title}</div>
                        <div style="font-size: 10px; color: var(--text-muted); margin-top: 8px;">
                            ${edu.type} · 专家推荐
                        </div>
                    </div>
                `;
            }).join('');
        }

        initPage();
    </script>
</body>
</html>
