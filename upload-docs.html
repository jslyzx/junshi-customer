<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能建档 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .doc-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px;
        }
        .doc-upload-card {
            background: white; border-radius: 20px; padding: 20px 16px;
            border: 2px dashed rgba(0, 122, 255, 0.15); text-align: center;
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .doc-upload-card:active { transform: scale(0.96); }
        .doc-upload-card.uploaded {
            border-style: solid; border-color: var(--success-color);
            background: #F0FFF4;
        }
        .doc-upload-card .doc-icon {
            width: 52px; height: 52px; border-radius: 16px; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .doc-upload-card .doc-name { font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .doc-upload-card .doc-hint { font-size: 11px; color: var(--text-muted); }
        .doc-upload-card .doc-check {
            display: none; position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; border-radius: 50%; background: var(--success-color);
            color: white; font-size: 12px; line-height: 22px; text-align: center;
        }
        .doc-upload-card.uploaded .doc-check { display: block; }
        .doc-upload-card .doc-thumb {
            display: none; width: 100%; height: 60px; object-fit: cover;
            border-radius: 8px; margin-top: 8px;
        }
        .doc-upload-card.uploaded .doc-thumb { display: block; }
        .doc-upload-card.uploaded .doc-hint { color: var(--success-color); }

        /* OCR 识别动画 */
        .ocr-loading {
            display: none; text-align: center; padding: 40px 0;
        }
        .ocr-loading.active { display: block; }
        .ocr-spinner {
            width: 48px; height: 48px; border: 3px solid var(--primary-soft);
            border-top-color: var(--primary-color); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 识别结果表单 */
        .ocr-result { display: none; }
        .ocr-result.active { display: block; }
        .result-field {
            display: flex; align-items: center; padding: 14px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }
        .result-field:last-child { border-bottom: none; }
        .result-label { width: 90px; font-size: 14px; color: var(--text-muted); flex-shrink: 0; }
        .result-value {
            flex: 1; border: none; background: transparent; font-size: 15px;
            font-weight: 600; color: var(--text-main); outline: none; text-align: right;
        }
        .result-value:focus { color: var(--primary-color); }
        .result-tag {
            font-size: 10px; background: var(--primary-soft); color: var(--primary-color);
            padding: 2px 6px; border-radius: 4px; margin-left: 8px; white-space: nowrap;
        }

        .required-mark { color: var(--danger-color); margin-right: 2px; }

        /* 微信授权弹窗 */
        .wx-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
            justify-content: center; align-items: flex-end;
        }
        .wx-overlay.active { display: flex; }
        .wx-auth-panel {
            width: 100%; max-width: 500px; background: white;
            border-radius: 24px 24px 0 0; padding: 32px 24px calc(24px + env(safe-area-inset-bottom));
            animation: wxSlideUp 0.3s ease-out;
        }
        @keyframes wxSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .wx-auth-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #07C160, #06AD56); margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
        }
        .wx-auth-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .wx-auth-desc { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 6px; }
        .wx-auth-phone {
            font-size: 24px; font-weight: 800; text-align: center; letter-spacing: 2px;
            margin: 16px 0 24px; color: var(--text-main);
        }
        .wx-btn-allow {
            width: 100%; height: 48px; border-radius: 24px; border: none;
            background: #07C160; color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-bottom: 12px;
        }
        .wx-btn-deny {
            width: 100%; height: 44px; border-radius: 22px; border: none;
            background: transparent; color: var(--text-muted); font-size: 14px; cursor: pointer;
        }

        /* 手机号授权按钮样式 */
        .phone-auth-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 16px; border-radius: 12px; border: 1.5px dashed rgba(7, 193, 96, 0.3);
            background: rgba(7, 193, 96, 0.05); cursor: pointer; transition: all 0.2s;
            font-size: 13px; font-weight: 600; color: #07C160;
        }
        .phone-auth-btn:active { transform: scale(0.97); background: rgba(7, 193, 96, 0.1); }
        .phone-auth-btn.authorized {
            border-style: solid; border-color: var(--success-color);
            background: #F0FFF4; color: var(--text-main); font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>

    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>智能建档</h1>
    </div>

    <div class="container animate-up">
        <!-- 步骤提示 -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 16px; background: var(--primary-soft); border-radius: 16px;">
            <div style="font-size: 24px;">🤖</div>
            <div>
                <div style="font-size: 14px; font-weight: 600; color: var(--primary-color);">AI 辅助识别</div>
                <div style="font-size: 12px; color: var(--text-secondary);">拍照上传资料，系统自动识别并填充信息</div>
            </div>
        </div>

        <!-- 上传卡片区 -->
        <div id="uploadSection">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1px;">上传材料</div>
            <div class="doc-grid">
                <div class="doc-upload-card" id="card-idcard" onclick="triggerUpload('idcard')">
                    <div class="doc-icon" style="background: #E6F0FF;">🪪</div>
                    <div class="doc-name">身份证正面</div>
                    <div class="doc-hint">必传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-idcard">
                </div>
                <div class="doc-upload-card" id="card-diagnosis" onclick="triggerUpload('diagnosis')">
                    <div class="doc-icon" style="background: #FFF2E6;">📋</div>
                    <div class="doc-name">诊断证明</div>
                    <div class="doc-hint">必传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-diagnosis">
                </div>
                <div class="doc-upload-card" id="card-prescription" onclick="triggerUpload('prescription')">
                    <div class="doc-icon" style="background: #E8F8E8;">💊</div>
                    <div class="doc-name">处方单</div>
                    <div class="doc-hint">选传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-prescription">
                </div>
                <div class="doc-upload-card" id="card-consent" onclick="triggerUpload('consent')">
                    <div class="doc-icon" style="background: #F3E8FF;">🖋️</div>
                    <div class="doc-name">知情同意书</div>
                    <div class="doc-hint">必传 · 拍照上传</div>
                    <div class="doc-check">✓</div>
                    <img class="doc-thumb" id="thumb-consent">
                </div>
            </div>
            <input type="file" id="fileInput" hidden accept="image/*" capture="environment">
        </div>

        <!-- OCR 识别中 -->
        <div class="ocr-loading" id="ocrLoading">
            <div class="ocr-spinner"></div>
            <div style="font-size: 15px; font-weight: 600; color: var(--text-main);">AI 正在识别中...</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">请稍候，正在提取文字信息</div>
        </div>

        <!-- 识别结果 -->
        <div class="ocr-result" id="ocrResult">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px;">识别结果</div>
                <span class="result-tag">AI 已识别 · 可修改</span>
            </div>
            <div class="form-section" style="padding: 4px 16px;">
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>姓名</span>
                    <input type="text" class="result-value" id="r-name" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>身份证号</span>
                    <input type="text" class="result-value" id="r-idcard" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">性别</span>
                    <input type="text" class="result-value" id="r-gender" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">出生日期</span>
                    <input type="date" class="result-value" id="r-birth" value="">
                </div>
            </div>

            <div class="form-section" style="padding: 4px 16px; margin-top: 16px;">
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>确诊疾病</span>
                    <input type="text" class="result-value" id="r-disease" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">疾病分期</span>
                    <input type="text" class="result-value" id="r-stage" value="" placeholder="待识别">
                </div>
                <div class="result-field">
                    <span class="result-label">确诊医院</span>
                    <input type="text" class="result-value" id="r-hospital" value="" placeholder="待识别">
                </div>
            </div>

            <div class="form-section" style="padding: 4px 16px; margin-top: 16px;">
                <div class="result-field">
                    <span class="result-label">用药方案</span>
                    <input type="text" class="result-value" id="r-medication" value="" placeholder="选传后识别">
                </div>
                <div class="result-field">
                    <span class="result-label"><span class="required-mark">*</span>手机号</span>
                    <input type="tel" class="result-value" id="r-phone" value="" readonly placeholder="点击右侧授权" maxlength="11">
                </div>
                <div style="padding: 8px 0 12px;">
                    <div class="phone-auth-btn" id="phoneAuthBtn" onclick="showWxAuth()">
                        <span style="font-size: 18px;">📱</span>
                        <span>微信一键授权获取手机号</span>
                    </div>
                </div>
            </div>

            <!-- 微信授权弹窗 -->
            <div class="wx-overlay" id="wxOverlay" onclick="closeWxAuth(event)">
                <div class="wx-auth-panel" onclick="event.stopPropagation()">
                    <div class="wx-auth-icon">📱</div>
                    <div class="wx-auth-title">获取你的手机号</div>
                    <div class="wx-auth-desc">君实生物患者管理申请获取你的手机号</div>
                    <div class="wx-auth-desc" style="font-size: 11px; color: var(--text-muted);">获取你绑定的手机号，方便接收项目通知</div>
                    <div class="wx-auth-phone" id="wxPhoneDisplay">138****6789</div>
                    <button class="wx-btn-allow" onclick="confirmWxAuth()">允许</button>
                    <button class="wx-btn-deny" onclick="closeWxAuth()">拒绝</button>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 24px;" onclick="handleSubmit()">确认提交</button>
            <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px;">
                信息仅用于临床管理，已加密存储
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentUploadType = '';
        const uploadedTypes = {};
        const ocrData = {};

        function triggerUpload(type) {
            currentUploadType = type;
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function() {
            if (!this.files[0]) return;
            const file = this.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                // 标记卡片为已上传
                const card = document.getElementById('card-' + currentUploadType);
                card.classList.add('uploaded');
                card.querySelector('.doc-hint').innerText = '已上传 ✓';
                const thumb = document.getElementById('thumb-' + currentUploadType);
                thumb.src = dataUrl;
                uploadedTypes[currentUploadType] = dataUrl;

                // 触发 OCR 识别
                runOCR(currentUploadType);
            };
            reader.readAsDataURL(file);
            this.value = ''; // 重置以允许重复上传
        });

        function runOCR(type) {
            // 显示识别动画
            document.getElementById('ocrLoading').classList.add('active');

            setTimeout(() => {
                // 模拟 OCR 结果
                const result = App.simulateOCR(type);
                Object.assign(ocrData, result);

                // 填充识别结果
                if (result.name) document.getElementById('r-name').value = result.name;
                if (result.idCard) document.getElementById('r-idcard').value = result.idCard;
                if (result.gender) document.getElementById('r-gender').value = result.gender;
                if (result.birthDate) document.getElementById('r-birth').value = result.birthDate;
                if (result.disease) document.getElementById('r-disease').value = result.disease;
                if (result.stage) document.getElementById('r-stage').value = result.stage;
                if (result.hospital) document.getElementById('r-hospital').value = result.hospital;
                if (result.medication) document.getElementById('r-medication').value = result.medication + ' ' + (result.dosage || '');

                // 隐藏 loading，显示结果
                document.getElementById('ocrLoading').classList.remove('active');
                document.getElementById('ocrResult').classList.add('active');
            }, 1500);
        }

        // 微信授权获取手机号
        const mockPhone = '13812346789';
        let phoneAuthorized = false;

        function showWxAuth() {
            if (phoneAuthorized) return;
            document.getElementById('wxOverlay').classList.add('active');
            // 显示脱敏手机号
            document.getElementById('wxPhoneDisplay').innerText = mockPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
        }

        function closeWxAuth(e) {
            document.getElementById('wxOverlay').classList.remove('active');
        }

        function confirmWxAuth() {
            phoneAuthorized = true;
            document.getElementById('r-phone').value = mockPhone;
            document.getElementById('wxOverlay').classList.remove('active');
            // 更新按钮状态
            const btn = document.getElementById('phoneAuthBtn');
            btn.classList.add('authorized');
            btn.innerHTML = '<span style="font-size: 16px;">✅</span><span>已授权：' + mockPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') + '</span>';
            btn.onclick = null;
        }

        function handleSubmit() {
            const name = document.getElementById('r-name').value;
            const idCard = document.getElementById('r-idcard').value;
            const disease = document.getElementById('r-disease').value;
            const phone = document.getElementById('r-phone').value;

            if (!name || !idCard || !disease) {
                alert('请确保姓名、身份证号和确诊疾病已填写');
                return;
            }
            if (!phone) {
                alert('请先授权获取手机号');
                showWxAuth();
                return;
            }
            if (!uploadedTypes['consent']) {
                alert('请上传知情同意书');
                return;
            }

            // 保存所有信息
            App.savePatientInfo({
                name,
                phone,
                idCard,
                gender: document.getElementById('r-gender').value,
                birthDate: document.getElementById('r-birth').value,
                disease: document.getElementById('r-disease').value,
                stage: document.getElementById('r-stage').value,
                hospital: document.getElementById('r-hospital').value,
                medication: document.getElementById('r-medication').value,
                ocrIdCard: !!uploadedTypes['idcard'],
                ocrDiagnosis: !!uploadedTypes['diagnosis'],
                ocrConsent: !!uploadedTypes['consent'],
                ocrPrescription: !!uploadedTypes['prescription'],
                consentPhoto: uploadedTypes['consent'],
                consentStatus: 'active',
                consentDate: App.formatDate(new Date()),
                isRegistered: true,
                hasProfile: true
            });

            alert('建档成功！资料已提交审核');
            App.navigateTo('index.html');
        }
    </script>
</body>
</html>
