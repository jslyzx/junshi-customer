<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>身份绑定 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .scan-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            text-align: center;
        }
        
        .radar-box {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 1px solid rgba(0, 122, 255, 0.2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.05) 0%, transparent 70%);
        }
        
        .radar-inner {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .radar-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 122, 255, 0.2), var(--primary-color), transparent);
            opacity: 0.8;
            height: 50%;
            animation: sweep 2.5s infinite linear;
        }

        @keyframes sweep {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        .ripple {
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: ripple 3s infinite linear;
            opacity: 0;
        }
        .ripple:nth-child(2) { animation-delay: 1s; }
        .ripple:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .doc-confirm-card {
            display: none;
            width: 100%;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div id="scanStep" class="scan-wrapper animate-up">
            <h1 class="welcome-title" style="color: var(--text-main); font-size: 24px; margin-bottom: 12px;">绑定您的专属医疗服务</h1>
            <p style="color: var(--text-secondary); margin-bottom: 40px; font-size: 15px;">请扫描医生或专员提供的动态二维码</p>
            
            <div class="radar-box" onclick="simulateScan()">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="radar-inner">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=JunshiDemo_D001" alt="QR" style="width: 120px; opacity: 0.5;">
                    <div class="radar-sweep"></div>
                </div>
            </div>
            
            <div style="font-size: 13px; color: var(--text-muted);">
                已加密识别环境，确保数据安全
            </div>
        </div>

        <div id="confirmStep" class="doc-confirm-card">
            <div class="card" style="padding: 30px 24px; border-radius: 32px;">
                <div style="text-align: center; margin-bottom: 24px;">
                    <div class="badge badge-success" style="margin-bottom: 10px;">识别成功</div>
                    <h2 style="font-size: 22px; font-weight: 800;">确认绑定服务</h2>
                </div>
                
                <div style="display: flex; align-items: center; gap: 18px; background: var(--bg-gray); padding: 15px; border-radius: 20px;">
                    <img id="docAvatar" src="" style="width: 64px; height: 64px; border-radius: 50%; border: 3px solid white;">
                    <div>
                        <div id="docName" style="font-size: 18px; font-weight: 700;"></div>
                        <div id="docDetail" style="font-size: 13px; color: var(--text-secondary);"></div>
                    </div>
                </div>
                
                <div style="margin-top: 24px; font-size: 14px; color: var(--text-secondary); line-height: 1.6;">
                    绑定后，您可以享受到由该医生团队提供的全程治疗随访、用药指导及健康咨询服务。
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="confirmBinding()">确认绑定</button>
            <button class="btn btn-outline mt-20" style="border:none" onclick="location.reload()">重新扫码</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('scan.html');
        let selectedDoctor = null;

        function simulateScan() {
            selectedDoctor = MockData.doctors[0];
            document.getElementById('scanStep').style.display = 'none';
            document.getElementById('confirmStep').style.display = 'block';
            document.getElementById('docAvatar').src = selectedDoctor.avatar;
            document.getElementById('docName').innerText = selectedDoctor.name + ' 主任医师';
            document.getElementById('docDetail').innerText = selectedDoctor.hospital;
        }

        function confirmBinding() {
            App.savePatientInfo({ boundDoctor: selectedDoctor, isBound: true });
            App.navigateTo('index.html');
        }
    </script>
</body>
</html>
