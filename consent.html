<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知情同意管理 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upload-area {
            border: 2px dashed rgba(0, 122, 255, 0.3);
            border-radius: 24px;
            padding: 48px 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .upload-area:active { background: var(--primary-soft); transform: scale(0.98); }
        .upload-area i { font-size: 48px; margin-bottom: 16px; display: block; }
        
        .image-preview-container {
            width: 100%; height: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            position: relative;
            background: #000;
        }
        .image-preview-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .status-header {
            padding: 20px; border-radius: 20px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 15px;
        }
        .status-header.pending { background: linear-gradient(135deg, #FFF9E6 0%, #FFF2CC 100%); color: #B28B00; }
        .status-header.success { background: linear-gradient(135deg, #E6F9EA 0%, #CEF1D6 100%); color: #1E7D32; }
        .status-header.withdrawn { background: linear-gradient(135deg, #FFF1F0 0%, #FFD8D6 100%); color: #CF1322; }

        .image-nav {
            position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 10px; pointer-events: none;
        }
        .nav-btn {
            width: 36px; height: 36px; background: rgba(0,0,0,0.4); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
            backdrop-filter: blur(4px); pointer-events: auto;
        }
        .page-indicator {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="header">
        <div class="back-btn" onclick="App.navigateTo('index.html')">‹</div>
        <h1>知情同意管理</h1>
    </div>

    <div class="container animate-up">
        <!-- 上传视图 -->
        <div id="uploadView">
            <div class="card" style="border:none">
                <div class="card-title">提交入组凭证</div>
                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                    请上传您已签署的纸质《知情同意书》照片。确保所有字迹清晰可见。
                </p>
                
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <span style="font-size: 50px; display: block; margin-bottom: 15px;">📄</span>
                    <div style="font-weight: 700; color: var(--primary-color); font-size: 18px;">点击拍摄或上传</div>
                    <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">确保图像光线均匀，内容完整</p>
                </div>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this)">
                
                <div id="previewBox" style="display: none; margin-top: 24px;">
                    <div class="image-preview-container">
                        <img id="uploadPreview">
                    </div>
                </div>
            </div>
            
            <button class="btn btn-primary" id="submitBtn" disabled onclick="submitConsent()" style="margin-top: 10px;">立即提交审核</button>
        </div>

        <!-- 详情视图 -->
        <div id="manageView" class="hidden">
            <div id="statusBanner" class="status-header">
                <div style="font-size: 24px;">⏳</div>
                <div>
                    <div style="font-weight: 800; font-size: 16px;" id="statusTitle">审核中</div>
                    <div style="font-size: 12px; opacity: 0.8;" id="statusDesc">预计在 24 小时内完成审核</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">已上传文件预览</div>
                <div class="image-preview-container">
                    <img id="finalPreview">
                    <div id="navControls" class="image-nav">
                        <div class="nav-btn" onclick="switchPage(-1)">‹</div>
                        <div class="nav-btn" onclick="switchPage(1)">›</div>
                    </div>
                    <div id="pageIndicator" class="page-indicator">第 1 / 1 页</div>
                    <div style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; padding: 4px 12px; border-radius: 10px; font-size: 12px; backdrop-filter: blur(5px);">签署副本</div>
                </div>
                
                <div style="margin-top: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <div style="font-size: 12px; color: var(--text-muted);">文件状态</div>
                        <div id="infoStatus" style="font-weight: 600;">待生效</div>
                    </div>
                    <div>
                        <div style="font-size: 12px; color: var(--text-muted);">提交日期</div>
                        <div id="infoTime" style="font-weight: 600;">2024-03-24</div>
                    </div>
                </div>
            </div>

            <div style="padding: 20px; text-align: center;">
                <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
                    您的知情同意书已归档并进入临床随访系统。如需修改或有任何疑问，请联系您的项目专员。
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const patient = App.getPatientInfo();

        let currentPage = 0;
        let photos = [];

        function initConsentPage() {
            if (patient.consentPhotos && patient.consentPhotos.length > 0 && patient.consentStatus !== 'withdrawn') {
                photos = patient.consentPhotos;
                showManageView();
            } else {
                showUploadView();
            }
        }

        function showUploadView() {
            document.getElementById('uploadView').classList.remove('hidden');
            document.getElementById('manageView').classList.add('hidden');
            if (patient.consentStatus === 'withdrawn') {
                const banner = document.createElement('div');
                banner.className = 'status-header withdrawn';
                banner.innerHTML = '<div>🚫</div><div><div style="font-weight:800">已撤回</div><div style="font-size:12px">您可以重新上传新的知情同意书</div></div>';
                document.getElementById('uploadView').prepend(banner);
            }
        }

        function showManageView() {
            document.getElementById('uploadView').classList.add('hidden');
            document.getElementById('manageView').classList.remove('hidden');
            updateImageView();
            document.getElementById('infoTime').innerText = patient.consentDate || App.formatDate(new Date());
            
            const banner = document.getElementById('statusBanner');
            if (patient.consentStatus === 'active') {
                banner.className = 'status-header success';
                document.getElementById('statusTitle').innerText = '审核已通过';
                document.getElementById('statusDesc').innerText = '您的管理服务已全面开启';
                document.getElementById('infoStatus').innerText = '正式生效';
            }

            if (photos.length <= 1) {
                document.getElementById('navControls').style.display = 'none';
                document.getElementById('pageIndicator').style.display = 'none';
            }
        }

        function updateImageView() {
            document.getElementById('finalPreview').src = photos[currentPage];
            document.getElementById('pageIndicator').innerText = `第 ${currentPage + 1} / ${photos.length} 页`;
        }

        function switchPage(dir) {
            currentPage = (currentPage + dir + photos.length) % photos.length;
            updateImageView();
        }

        function previewImage(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('uploadPreview').src = e.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                    document.getElementById('submitBtn').disabled = false;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitConsent() {
            const previewSrc = document.getElementById('uploadPreview').src;
            App.savePatientInfo({
                consentPhotos: [previewSrc],
                consentStatus: 'active',
                consentDate: App.formatDate(new Date())
            });
            alert('入组资料已提交，请等待审核');
            window.location.reload();
        }

        initConsentPage();
    </script>
</body>
</html>
