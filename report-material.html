<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资料上传 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }
        .upload-box {
            aspect-ratio: 1;
            background: #F2F2F7;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed #E5E5EA;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .upload-box:active {
            background: #E5E5EA;
            transform: scale(0.96);
        }
        .upload-icon {
            font-size: 24px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        .upload-text {
            font-size: 11px;
            color: var(--text-muted);
        }
        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 2;
        }

        .history-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .history-content {
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .history-imgs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .history-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>

    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>资料上传</h1>
    </div>

    <div class="container animate-up">
        <div class="card" style="padding: 20px; border-radius: 24px;">
            <div style="font-size: 15px; font-weight: 700; margin-bottom: 12px;">上传新资料</div>
            <textarea id="reportDesc" placeholder="请简要描述您要上传的资料内容（如：最新的化验单、出院小结等）..." style="width: 100%; border: 1px solid #F2F2F7; background: #F9F9F9; border-radius: 12px; padding: 12px; font-family: inherit; font-size: 14px; outline: none; min-height: 100px; resize: none;"></textarea>
            
            <div class="upload-grid">
                <div id="image-container" style="display: contents;">
                    <!-- 预览图会插在这里 -->
                </div>
                <div class="upload-box" onclick="simulateUpload()">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">点击上传</div>
                </div>
            </div>
            
            <div style="margin-top: 24px;">
                <button class="btn btn-primary" onclick="submitReport()">提交资料</button>
            </div>
        </div>

        <div style="font-size: 15px; font-weight: 700; margin: 32px 0 16px; padding-left: 4px;">历史上传</div>
        <div id="historyList">
            <!-- 历史列表将通过 JS 渲染 -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let uploadedImages = [];

        window.onload = function() {
            renderHistory();
        }

        function simulateUpload() {
            if (uploadedImages.length >= 6) {
                alert('最多上传6张图片');
                return;
            }
            // 模拟上传：随机从图库里选几个图片
            const mockImgs = [
                'https://images.unsplash.com/photo-1576091160550-2173bdb999ef?auto=format&fit=crop&q=80&w=200',
                'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=200',
                'https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&q=80&w=200'
            ];
            const randomImg = mockImgs[Math.floor(Math.random() * mockImgs.length)];
            uploadedImages.push(randomImg);
            renderPreviews();
        }

        function renderPreviews() {
            const container = document.getElementById('image-container');
            container.innerHTML = uploadedImages.map((img, index) => `
                <div class="upload-box">
                    <img src="${img}" class="preview-img">
                    <div class="remove-btn" onclick="event.stopPropagation(); removeImage(${index})">×</div>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderPreviews();
        }

        function renderHistory() {
            const p = App.getPatientInfo();
            const reports = p.materialReports || [];
            const listEl = document.getElementById('historyList');
            
            if (reports.length === 0) {
                listEl.innerHTML = `
                    <div style="text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 13px;">
                        暂无历史上传记录
                    </div>
                `;
                return;
            }

            listEl.innerHTML = reports.map(r => `
                <div class="history-item">
                    <div class="history-header">
                        <span>上报时间</span>
                        <span>${r.date}</span>
                    </div>
                    <div class="history-content">${r.desc}</div>
                    ${r.images && r.images.length > 0 ? `
                        <div class="history-imgs">
                            ${r.images.map(img => `<img src="${img}" class="history-img">`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function submitReport() {
            const desc = document.getElementById('reportDesc').value;
            if (!desc && uploadedImages.length === 0) {
                alert('请填写描述或上传图片');
                return;
            }

            const p = App.getPatientInfo();
            const reports = p.materialReports || [];
            reports.unshift({
                desc: desc,
                images: [...uploadedImages],
                date: new Date().toLocaleString()
            });

            App.savePatientInfo({ materialReports: reports });

            alert('提交成功！');
            
            // 重置
            document.getElementById('reportDesc').value = '';
            uploadedImages = [];
            renderPreviews();
            renderHistory();
        }
    </script>
</body>
</html>
