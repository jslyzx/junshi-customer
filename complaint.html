<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>意见与投诉 - 君实生物</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .anfu-card {
            background: linear-gradient(135deg, #007AFF, #5856D6);
            color: white;
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        .anfu-card::after {
            content: '❤️';
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 80px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        .anfu-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
        .anfu-text { font-size: 14px; line-height: 1.6; opacity: 0.9; }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .select-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 24px;
        }
        .select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.2s;
        }
        .select-item:last-child { border-bottom: none; }
        .select-item.active { background: rgba(0, 122, 255, 0.02); }
        
        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #E5E5EA;
            border-radius: 50%;
            position: relative;
            transition: all 0.2s;
        }
        .select-item.active .radio-circle {
            border-color: var(--primary-color);
            background: var(--primary-color);
        }
        .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px;
            background: white; border-radius: 50%;
            display: none;
        }
        .select-item.active .radio-circle::after { display: block; }

        .history-title {
            font-size: 15px;
            font-weight: 700;
            margin: 40px 0 16px;
            display: flex;
            align-items: center;
        }
        .history-title::before {
            content: '';
            width: 4px; height: 16px;
            background: var(--primary-color);
            border-radius: 2px;
            margin-right: 8px;
        }

        .complaint-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .complaint-target {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }
        .complaint-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .status-pending { background: #FFF9E6; color: #FFB300; }
        .status-replied { background: #E6F7FF; color: #1890FF; }

        .complaint-body {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .complaint-date {
            font-size: 11px;
            color: #C1C1C7;
        }

        .reply-box {
            margin-top: 12px;
            padding: 12px;
            background: #F8F9FF;
            border-radius: 12px;
            border-left: 3px solid var(--primary-color);
        }
        .reply-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }
        .reply-content {
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>

    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>意见与投诉</h1>
    </div>

    <div class="container animate-up">
        <div class="anfu-card">
            <div class="anfu-title">亲爱的患者：</div>
            <div class="anfu-text">
                我们非常重视您的每一份反馈。如果您在项目过程中遇到任何不快或问题，请告诉我们。您的监督是我们进步的动力，我们将竭诚为您提供更优质的服务。
            </div>
        </div>

        <!-- 投诉表单 -->
        <div id="complaintFormArea">
            <div class="form-label">请选择投诉对象</div>
            <div class="select-list">
                <div class="select-item" onclick="selectObject(this, '随访中心')">
                    <span style="font-weight: 600;">随访中心</span>
                    <div class="radio-circle"></div>
                </div>
                <div class="select-item" onclick="selectObject(this, '项目专员')">
                    <span style="font-weight: 600;">项目专员</span>
                    <div class="radio-circle"></div>
                </div>
                <div class="select-item" onclick="selectObject(this, '其他建议')">
                    <span style="font-weight: 600;">其他建议</span>
                    <div class="radio-circle"></div>
                </div>
            </div>

            <div class="form-label">投诉内容描述</div>
            <div class="card" style="padding: 16px; border-radius: 20px;">
                <textarea id="complaintContent" placeholder="请详细描述您遇到的问题，以便我们更好地为您跟进解决..." style="width: 100%; border: none; font-family: inherit; font-size: 14px; outline: none; min-height: 120px; resize: none;"></textarea>
            </div>

            <div style="margin-top: 32px; padding: 0 10px;">
                <button class="btn btn-primary" onclick="submitComplaint()">提交投诉</button>
            </div>
        </div>

        <!-- 历史记录 -->
        <div id="historyArea">
            <div class="history-title">历史投诉</div>
            <div id="complaintList">
                <!-- 投诉列表将通过 JS 渲染 -->
            </div>
        </div>

        <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin: 30px 0 20px;">* 提交后，项目组将在 1-3 个工作日内给予回复</p>
    </div>

    <script src="js/app.js"></script>
    <script>
        let selectedObject = '';

        window.onload = function() {
            renderComplaints();
        }

        function selectObject(el, obj) {
            document.querySelectorAll('.select-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedObject = obj;
        }

        function renderComplaints() {
            const p = App.getPatientInfo();
            const complaints = p.complaints || [];
            const listEl = document.getElementById('complaintList');
            
            if (complaints.length === 0) {
                listEl.innerHTML = `
                    <div style="text-align: center; padding: 40px 0; color: #C1C1C7;">
                        <div style="font-size: 40px; margin-bottom: 10px; opacity: 0.5;">📋</div>
                        <div style="font-size: 13px;">暂无投诉记录</div>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = complaints.map(c => `
                <div class="complaint-item">
                    <div class="complaint-header">
                        <span class="complaint-target">投诉对象：${c.target}</span>
                        <span class="complaint-status ${c.reply ? 'status-replied' : 'status-pending'}">
                            ${c.reply ? '已回复' : '处理中'}
                        </span>
                    </div>
                    <div class="complaint-body">${c.content}</div>
                    <div class="complaint-date">${c.date}</div>
                    
                    ${c.reply ? `
                        <div class="reply-box animate-scale">
                            <div class="reply-title">
                                <span style="margin-right: 4px;">💬</span> 随访中心回复
                            </div>
                            <div class="reply-content">${c.reply}</div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function submitComplaint() {
            if (!selectedObject) {
                alert('请选择投诉对象');
                return;
            }
            const content = document.getElementById('complaintContent').value;
            if (!content) {
                alert('请填写投诉内容');
                return;
            }

            const p = App.getPatientInfo();
            const complaints = p.complaints || [];
            
            // 为了演示方便，如果投诉内容包含特定的关键词，模拟自动回复（或者在这里模拟被管理员回复的状态）
            const newComplaint = {
                target: selectedObject,
                content: content,
                date: new Date().toLocaleString(),
                reply: null // 初始无回复
            };

            complaints.unshift(newComplaint);
            App.savePatientInfo({ complaints });

            alert('提交成功！我们将尽快为您处理。');
            
            // 清空表单
            document.getElementById('complaintContent').value = '';
            document.querySelectorAll('.select-item').forEach(item => item.classList.remove('active'));
            selectedObject = '';
            
            // 重新渲染
            renderComplaints();
        }
    </script>
</body>
</html>
